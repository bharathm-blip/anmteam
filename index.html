<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>ANM Leave & Expense Portal</title>
    <meta name="theme-color" content="#1A2240" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ANM Portal" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      body { margin: 0; }
      html, body { overflow-x: hidden; }
    </style>
  </head>
  <body>
    <div id="root">
      <div style="position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#F5F4F0;font-family:system-ui,Arial,sans-serif">
        <div style="width:46px;height:46px;border:4px solid #E2DDD4;border-top-color:#B8851E;border-radius:50%;animation:anmspin 0.8s linear infinite"></div>
        <div style="margin-top:16px;color:#7A7060;font-size:14px;font-weight:600">Loading ANM Portal…</div>
      </div>
    </div>
    <style>@keyframes anmspin{to{transform:rotate(360deg)}}</style>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
